nt-size:18px>Super Toolbox</span><div style=margin-left:auto;display:flex;align-items:center;gap:10px><small>offline devtools suite</small> <button class="action secondary"id=themeToggle style="padding:4px 10px;font-size:11px">🌙 Dark</button></div></header><div id=tabs></div><div id=content></div><script>const tools={"Base64 / URL / HTML":`
  <div class="card">
    <h2>Base64</h2>
    <textarea id="b64in" placeholder="Input"></textarea>

  <div class="card">

    <button class="action" onclick="urlout.value=encodeURIComponent(urlin.value)">Encode</button>

    <textarea id="urlout" placeholder="Output"></textarea>
  </div>

  <div class="card">

    <button class="action secondary" onclick="htmlout.value=new DOMParser().parseFromString(htmlin.value,'text/html').documentElement.textContent">Unescape</button>
    <textarea id="htmlout" placeholder="Output"></textarea>
  </div>
`,"Time / JWT":`

  <div class="card">
    <h2>JWT Decode</h2>
    <textarea id="jwtin" placeholder="Paste JWT"></textarea>
    <button class="action" onclick="decodeJWT()">Decode</button>
    <textarea id="jwtout" placeholder="Header + payload"></textarea>
    <small class="hint">Signature is not verified; inspection only.</small>
  </div>
`,"Hashing / AES":`
  <div class="card">
    <h2>Hashing</h2>

    <button class="action" onclick="doHash('SHA-256')">SHA-256</button>
    <button class="action" onclick="doHash('SHA-1')">SHA-1</button>
    <button class="action" onclick="doMD5()">MD5</button>
    <textarea id="hashout" placeholder="Hex digest"></textarea>
  </div>

  <div class="card">
    <h2>AES Encrypt / Decrypt (toy)</h2>
    <textarea id="aesText" placeholder="Text"></textarea>
    <input id="aesKey" placeholder="Password">
    <button class="action" onclick="aesEncrypt()">Encrypt</button>
    <button class="action secondary" onclick="aesDecrypt()">Decrypt</button>
    <textarea id="aesOut" placeholder="Cipher / plain"></textarea>
    <small class="hint">Not real AES, just a simple local obfuscation.</small>
  </div>
`,"QR / UUID / Random":`
  <div class="card">
    <h2>QR Code Generator</h2>
    <textarea id="qrText" placeholder="Text / URL"></textarea>
    <button class="action" onclick="makeQR()">Generate</button>
    <div id="qrOut" style="margin-top:8px;"></div>
    <small class="hint">Uses an online QR API if you’re connected.</small>
  </div>

  <div class="card">
    <h2>UUID Generator</h2>
    <button class="action" onclick="uuidOut.value=crypto.randomUUID()">Generate UUID</button>
    <textarea id="uuidOut" placeholder="UUID"></textarea>
  </div>

  <div class="card">
    <h2>Random Generators</h2>
    <button class="action" onclick="randOut.value=Math.random()">Random Float</button>
    <button class="action" onclick="randOut.value=Math.floor(Math.random()*1e9)">Random Int</button>
    <textarea id="randOut" placeholder="Random value"></textarea>

`,"Markdown / Sandbox":`
  <div class="card">
    <h2>Markdown Preview (very basic)</h2>

  </div>

  <div class="card">
    <h2>HTML/CSS/JS Sandbox</h2>

    <textarea id="sandboxCSS" placeholder="CSS"></textarea>

  <div class="card">

  <div class="card">

`,"Diff / Clipboard":`
  <div class="card">

  <div class="card">
    <h2>Clipboard</h2>

    <button class="action danger" onclick="localStorage.removeItem('super_clip');clip.value=''">Clear</button>

`,"Fun / Experimental":`

  </div>
