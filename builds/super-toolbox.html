<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Super Toolbox</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='%2300adee'/>
<text x='50' y='58' font-size='50' text-anchor='middle' fill='white' font-family='sans-serif'>🧰</text>
</svg>">

<style>
:root {
  --bg: #111827;
  --fg: #e5e7eb;
  --card: #020617;
  --border: #1f2937;
  --input-bg: #0f172a;
  --accent: #38bdf8;
}

.light {
  --bg: #f3f4f6;
  --fg: #111827;
  --card: #ffffff;
  --border: #d1d5db;
  --input-bg: #f9fafb;
  --accent: #2563eb;
}

/* animated theme transitions */
body, header, #tabs, #content, .card, textarea, input, button, pre {
  transition: background-color .35s ease, color .35s ease, border-color .35s ease;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
}

header {
  background: var(--card);
  padding: 14px 20px;
  font-size: 20px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#tabs {
  display: flex;
  overflow-x: auto;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

#tabs button {
  flex: 0 0 auto;
  padding: 10px 14px;
  background: transparent;
  border: 0;
  color: var(--fg);
  opacity: 0.6;
  cursor: pointer;
  font-size: 13px;
  transition: opacity .25s ease;
}

#tabs button.active {
  opacity: 1;
  border-bottom: 2px solid var(--accent);
}

#content {
  padding: 16px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 14px;
}

textarea, input {
  width: 100%;
  background: var(--input-bg);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  margin: 6px 0;
  font-family: ui-monospace, monospace;
  font-size: 13px;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

button.action {
  padding: 6px 12px;
  background: var(--accent);
  border-radius: 999px;
  border: 0;
  color: var(--card);
  font-size: 12px;
  font-weight: 600;
  margin: 4px 4px 8px 0;
  cursor: pointer;
  transition: background-color .25s ease, color .25s ease;
}

button.secondary {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
}

button.danger {
  background: #ef4444;
  color: #f9fafb;
}

pre {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  white-space: pre-wrap;
  word-break: break-word;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.row > * {
  flex: 1 1 0;
}

small.hint {
  font-size: 11px;
  color: #6b7280;
}
</style>
</head>

/* ===================== HELPERS ===================== */

function decodeJWT(){
  try{
    let p = jwtin.value.split('.');
    if(p.length < 2) throw new Error("Not a JWT");
    const h = JSON.parse(atob(p[0]));
    const b = JSON.parse(atob(p[1]));
    jwtout.value = JSON.stringify(h,null,2) + "\n\n" + JSON.stringify(b,null,2);
  }catch(e){
    jwtout.value = "Invalid JWT: " + e;
  }
}

async function doHash(type){
  try{
    const enc = new TextEncoder().encode(hashin.value);
    const buf = await crypto.subtle.digest(type, enc);
    hashout.value = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    hashout.value = "Error: " + e;
  }
}

function doMD5(){
  hashout.value = "MD5 implementation omitted in this compact build.";
}

function aesEncrypt(){
  // toy "encryption": base64(text::key)
  aesOut.value = btoa(aesText.value + "::" + aesKey.value);
}
function aesDecrypt(){
  try{
    const decoded = atob(aesOut.value);
    const [text,key] = decoded.split("::");
    aesOut.value = (key === aesKey.value) ? text : "Wrong password";
  }catch(e){
    aesOut.value = "Invalid blob";
  }
}

function makeQR(){
  qrOut.innerHTML = "";
  if(!qrText.value){ return; }
  const img = document.createElement("img");
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(qrText.value);
  img.alt = "QR code";
  img.style.borderRadius = "4px";
  qrOut.appendChild(img);
}

function renderMD(){
  // super simple: escape HTML and show as text
  const text = mdIn.value || "";
  const escaped = text.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  mdOut.innerHTML = "<pre style='margin:0;white-space:pre-wrap;'>" + escaped + "</pre>";
}

function runSandbox(){
  const html = sandboxHTML.value || "";
  const css = "<style>" + (sandboxCSS.value || "") + "</style>";
  const js  = "<script>" + (sandboxJS.value || "") + "<\/script>";
  sandboxFrame.srcdoc = html + css + js;
}

function csvToJson(){
  try{
    const lines = csvIn.value.trim().split(/\n/);
    if(!lines.length){ csvOut.value=""; return; }
    const headers = lines.shift().split(",");
    const out = lines.map(l=>{
      const vals = l.split(",");
      let o={};
      headers.forEach((h,i)=>o[h]=vals[i]);
      return o;
    });
    csvOut.value = JSON.stringify(out,null,2);
  }catch(e){
    csvOut.value = "Error: " + e;
  }
}

function jsonToCsv(){
  try{
    const arr = JSON.parse(jsonCsvIn.value);
    if(!Array.isArray(arr) || !arr.length){ jsonCsvOut.value=""; return; }
    const headers = Object.keys(arr[0]);
    const rows = arr.map(o=>headers.map(h=>o[h]).join(","));
    jsonCsvOut.value = headers.join(",") + "\n" + rows.join("\n");
  }catch(e){
    jsonCsvOut.value = "Invalid JSON: " + e;
  }
}

function yamlToJson(){
  yamlOut.value = "YAML → JSON not implemented in this compact build.";
}
function jsonToYaml(){
  yamlOut.value = "JSON → YAML not implemented in this compact build.";
}

function runRegex(){
  try{
    const r = eval(regExp.value); // e.g. /foo/gi
    const m = regText.value.match(r);
    regOut.value = m ? JSON.stringify(m,null,2) : "No match";
  }catch(e){
    regOut.value = "Invalid regex: " + e;
  }
}

function explainRegex(){
  const s = regExplainIn.value || "";
  if(!s){ regExplainOut.value="No regex."; return; }
  regExplainOut.value = "Regex explanation stub for: " + s;
}

function parseURL(){
  try{
    const u = new URL(urlParseIn.value);
    urlParseOut.value = JSON.stringify({
      protocol: u.protocol,
      host: u.host,
      pathname: u.pathname,
      search: u.search,
      hash: u.hash
    },null,2);
  }catch(e){
    urlParseOut.value = "Invalid URL: " + e;
  }
}

function textStats(){
  const t = textStatsIn.value || "";
  const chars = t.length;
  const words = t.trim() ? t.trim().split(/\s+/).length : 0;
  const lines = t.split(/\n/).length;
  textStatsOut.value = JSON.stringify({chars,words,lines},null,2);
}

function diff(a,b){
  let out="",aa=a.split(/\n/),bb=b.split(/\n/);
  const max=Math.max(aa.length,bb.length);
  for(let i=0;i<max;i++){
    if(aa[i]!==bb[i]){
      out+=`- ${aa[i]||""}\n+ ${bb[i]||""}\n`;
    }
  }
  return out||"No differences";
}

/* Level 5 helpers */

function makeAscii(text){
  if(!text) return "";
  const chars = " .:-=+*#%@";
  let out = "";
  for(let i=0;i<text.length;i++){
    const code = text.charCodeAt(i);
    const idx = code % chars.length;
    out += chars[idx];
  }
  return out;
}

function makeNoise(w,h){
  w = parseInt(w)||32;
  h = parseInt(h)||16;
  let out = "";
  for(let y=0;y<h;y++){
    let row="";
    for(let x=0;x<w;x++){
      row += Math.random()>0.5 ? "█" : " ";
    }
    out += row + "\n";
  }
  return out;
}

function analyzePassword(pw){
  if(!pw) return "No password entered.";
  const length = pw.length;
  const hasLower = /[a-z]/.test(pw);
  const hasUpper = /[A-Z]/.test(pw);
  const hasNum   = /[0-9]/.test(pw);
  const hasSym   = /[^A-Za-z0-9]/.test(pw);
  let score = 0;
  if(length >= 8) score++;
  if(length >= 12) score++;
  if(hasLower && hasUpper) score++;
  if(hasNum) score++;
  if(hasSym) score++;
  const levels = ["Very weak","Weak","Okay","Good","Strong","Very strong"];
  return JSON.stringify({
    length,
    hasLower,
    hasUpper,
    hasNum,
    hasSym,
    score,
    rating: levels[score]
  },null,2);
}

function runTerminal(expr){
  try{
    return String(eval(expr));
  }catch(e){
    return "Error: " + e;
  }
}

function runRepl(code){
  try{
    return String(eval(code));
  }catch(e){
    return "Error: " + e;
  }
}

let pixelCtx, pixelSize = 10;
function initPixelCanvas(){
  const c = document.getElementById("pixelCanvas");
  if(!c) return;
  pixelCtx = c.getContext("2d");
  pixelCtx.fillStyle = "#000";
  pixelCtx.fillRect(0,0,c.width,c.height);
  c.addEventListener("click", e=>{
    const rect = c.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left)/pixelSize)*pixelSize;
    const y = Math.floor((e.clientY - rect.top)/pixelSize)*pixelSize;
    const img = pixelCtx.getImageData(x,y,1,1).data;
    const isOn = img[0] > 0 || img[1] > 0 || img[2] > 0;
    pixelCtx.fillStyle = isOn ? "#000000" : "#ffffff";
    pixelCtx.fillRect(x,y,pixelSize,pixelSize);
  }, { once: true });
}

function clearPixels(){
  const c = document.getElementById("pixelCanvas");
  if(!c || !pixelCtx) return;
  pixelCtx.fillStyle = "#000";
  pixelCtx.fillRect(0,0,c.width,c.height);
}

/* ===================== THEME TOGGLE ===================== */

const themeBtn = document.getElementById("themeToggle");

if (localStorage.getItem("toolboxTheme") === "light") {
  document.body.classList.add("light");
  themeBtn.textContent = "🌞 Light";
}

themeBtn.onclick = () => {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  themeBtn.textContent = isLight ? "🌞 Light" : "🌙 Dark";
  localStorage.setItem("toolboxTheme", isLight ? "light" : "dark");
};

];

tabDefs.forEach(([name,icon],i)=>{
  const b = document.createElement("button");
  b.innerHTML = `<span>${icon}</span> <span>${name}</span>`;
  b.onclick = () => show(name,b);
  if(i===0) b.classList.add("active");
  tabs.appendChild(b);
});

function show(name,btn){
  [...tabs.children].forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  content.innerHTML = `<section style="display:block">${tools[name]}</section>`;
  if (name === "Fun / Experimental") {
    setTimeout(initPixelCanvas, 0);
  }
}

show(tabDefs[0][0], tabs.children[0]);
</script>

</body>
</html>
